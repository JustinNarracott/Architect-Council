# Coding Standards — naming, patterns, and quality expectations

naming_conventions:
  files:
    python: snake_case
    typescript: kebab-case
    react_components: PascalCase
  functions:
    python: snake_case
    typescript: camelCase
  classes: PascalCase
  constants: UPPER_SNAKE_CASE
  database_tables: snake_case
  api_endpoints: kebab-case

required_patterns:
  - Repository pattern for data access (no direct DB queries in controllers/routes)
  - Dependency injection for service dependencies
  - Error handling middleware (not try/catch in every handler)
  - Configuration via environment variables (not hardcoded)
  - Structured logging (not print statements)

prohibited_patterns:
  - God classes or modules exceeding 500 lines
  - Circular imports or circular dependencies
  - Magic numbers (use named constants)
  - Copy-paste code blocks (extract to shared utilities)
  - Deeply nested logic (max 3 levels of nesting)
  - Business logic in controllers/route handlers

code_quality:
  max_file_lines: 500
  max_function_lines: 50
  required_tooling:
    python:
      linter: "ruff or flake8"
      formatter: "black or ruff format"
      type_checker: "mypy or pyright"
    typescript:
      linter: "eslint"
      formatter: "prettier"
      type_checking: "strict mode enabled"
  documentation:
    - All public functions must have docstrings/JSDoc
    - All modules must have a top-level docstring/comment explaining purpose
    - Complex algorithms must have inline comments
