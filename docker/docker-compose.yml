version: "3.9"

services:
  architecture-council-backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    image: architecture-council-backend:latest
    ports:
      - "8011:8000"
    env_file:
      - ../.env
    environment:
      # Server config (defaults if not in .env)
      - HOST=${HOST:-0.0.0.0}
      - PORT=${PORT:-8000}
      - RELOAD=${RELOAD:-false}
      # Suppress LiteLLM proxy import noise (apscheduler etc.)
      - LITELLM_LOG=ERROR
      # Ollama local model server for Security Analyst
      # Override in .env if your Ollama runs on a different host/port
      - OLLAMA_API_BASE=${OLLAMA_API_BASE:-http://localhost:11434}
    volumes:
      # Mount your local repositories for codebase analysis
      # Set REPOS_PATH in .env to point to your projects directory
      - ${REPOS_PATH:-./repos}:/repos:ro
      - ../governance/defaults:/app/governance/defaults
    restart: unless-stopped

  architecture-council-frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    image: architecture-council-frontend:latest
    ports:
      - "3011:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8011
    depends_on:
      - architecture-council-backend
    restart: unless-stopped
